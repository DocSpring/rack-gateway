version: "3"
run: once

tasks:
  deps:
    dir: mock-oauth
    desc: Install dependencies for mock OAuth server
    sources:
      - package.json
      - pnpm-lock.yaml
      - ../Taskfile.mock-oauth.yml
    cmds: [pnpm install]

  build:
    dir: mock-oauth
    desc: Build the TypeScript mock OAuth server
    deps: [deps]
    sources:
      - package.json
      - pnpm-lock.yaml
      - tsconfig.json
      - ../Taskfile.mock-oauth.yml
      - "*.ts"
    generates:
      - dist/**/*
    cmds: [pnpm build]

  test:
    dir: mock-oauth
    desc: Run mock OAuth server unit tests
    deps: [deps]
    cmds: [pnpm test]

  lint:
    desc: Run TypeScript typecheck and Biome lint
    deps: [lint:typecheck, lint:biome]

  lint:fix:
    desc: Run TypeScript typecheck and auto-fix Biome issues (safe)
    deps: [lint:typecheck, lint:biome:fix]

  lint:typecheck:
    dir: mock-oauth
    desc: Run TypeScript type checking
    deps: [deps]
    cmds: [pnpm typecheck]

  lint:biome:
    dir: mock-oauth
    desc: Run Biome lint
    deps: [deps]
    cmds: [pnpm exec biome check .]

  lint:biome:fix:
    dir: mock-oauth
    desc: Lint mock OAuth server and apply safe fixes
    deps: [deps]
    cmds: [pnpm exec biome check . --write]

  format:
    dir: mock-oauth
    desc: Format mock OAuth code (Biome)
    deps: [deps]
    cmds: [pnpm exec biome format --write .]

  dev:
    dir: mock-oauth
    desc: Run mock OAuth server in watch mode
    deps: [deps]
    cmds: [pnpm dev]
