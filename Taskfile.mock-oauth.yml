version: "3"
run: once

tasks:
  deps:
    dir: mock-oauth
    desc: Install dependencies for mock OAuth server
    sources:
      - package.json
      - pnpm-lock.yaml
      - ../Taskfile.mock-oauth.yml
    cmds:
      - pnpm install

  build:
    dir: mock-oauth
    desc: Build the TypeScript mock OAuth server
    deps: [deps]
    sources:
      - package.json
      - pnpm-lock.yaml
      - tsconfig.json
      - ../Taskfile.mock-oauth.yml
      - "*.ts"
    generates:
      - dist/**/*
    cmds:
      - pnpm build

  lint:
    desc: Run TypeScript typecheck and Biome lint
    deps: [lint:typecheck, lint:biome]

  lint:typecheck:
    dir: mock-oauth
    desc: Run TypeScript type checking
    deps: [deps]
    sources:
      - ../Taskfile.mock-oauth.yml
      - package.json
      - pnpm-lock.yaml
      - tsconfig.json
      - "*.ts"
    cmds:
      - pnpm typecheck

  lint:biome:
    dir: mock-oauth
    desc: Run Biome lint
    deps: [deps]
    sources:
      - ../Taskfile.mock-oauth.yml
      - package.json
      - pnpm-lock.yaml
      - biome.json
      - "*.ts"
    cmds:
      - pnpm exec biome check .

  lint:biome:fix:
    dir: mock-oauth
    aliases: [lint:fix]
    desc: Lint mock OAuth server and apply safe fixes
    deps: [deps]
    sources:
      - ../Taskfile.mock-oauth.yml
      - package.json
      - pnpm-lock.yaml
      - biome.json
      - "*.ts"
    cmds:
      - pnpm exec biome check . --write

  dev:
    dir: mock-oauth
    desc: Run mock OAuth server in watch mode
    deps: [deps]
    cmds:
      - pnpm dev
