version: "3"
run: once

tasks:
  deps:
    dir: mock-oauth
    desc: Install dependencies for mock OAuth server
    cmds:
      - pnpm install

  build:
    dir: mock-oauth
    desc: Build the TypeScript mock OAuth server
    deps: [deps]
    sources:
      - mock-oauth/package.json
      - mock-oauth/pnpm-lock.yaml
      - mock-oauth/tsconfig.json
      - mock-oauth/**/*.ts
      - exclude: mock-oauth/node_modules/**
      - exclude: mock-oauth/dist/**
    generates:
      - mock-oauth/dist/**/*
    cmds:
      - pnpm build

  lint:
    desc: Run TypeScript typecheck and Biome lint
    deps: [lint:typecheck, lint:biome]

  lint:typecheck:
    dir: mock-oauth
    desc: Run TypeScript type checking
    deps: [deps]
    cmds:
      - pnpm typecheck

  lint:biome:
    dir: mock-oauth
    desc: Run Biome lint
    deps: [deps]
    cmds:
      - pnpm exec biome check .

  lint:biome:fix:
    dir: mock-oauth
    aliases: [lint:fix]
    desc: Lint mock OAuth server and apply safe fixes
    deps: [deps]
    cmds:
      - pnpm exec biome check . --write

  dev:
    dir: mock-oauth
    desc: Run mock OAuth server in watch mode
    deps: [deps]
    cmds:
      - pnpm dev
