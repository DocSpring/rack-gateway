version: "3"

env:
  WEB_PORT: "{{.WEB_PORT | default 5223}}"
  GATEWAY_PORT: "{{.GATEWAY_PORT | default 8447}}"

tasks:
  deps:
    dir: web
    desc: Install web dependencies (pnpm)
    run: once
    cmds:
      - pnpm install --frozen-lockfile

  generate:
    dir: web
    desc: Generate code
    deps: [generate:openapi, generate:types, generate:client]

  generate:openapi:
    dir: web
    desc: Convert swagger.json to OpenAPI client + TS types
    deps: [deps]
    cmds: [pnpm generate:openapi]

  generate:types:
    dir: web
    desc: Generate TypeScript types from OpenAPI schema
    deps: [generate:openapi]
    cmds: [pnpm generate:types]

  generate:client:
    dir: web
    desc: Generate OpenAPI client from OpenAPI schema
    deps: [generate:openapi]
    cmds: [pnpm generate:client]

  build:
    dir: web
    desc: Build the web SPA with Vite
    deps: [deps]
    cmds:
      - pnpm build

  lint:
    desc: Run TypeScript typecheck and Biome lint
    deps: [lint:typecheck, lint:biome]

  lint:fix:
    desc: Run TypeScript typecheck and auto-fix Biome issues (safe)
    deps: [lint:typecheck, lint:biome:fix]

  lint:typecheck:
    dir: web
    desc: Run TypeScript type checking
    deps: [deps]
    cmds:
      - pnpm typecheck

  lint:biome:
    dir: web
    desc: Run Biome lint
    deps: [deps]
    cmds:
      - pnpm lint

  lint:biome:fix:
    dir: web
    desc: Run Biome lint
    deps: [deps]
    cmds:
      - pnpm lint:fix

  lint:unsafe:
    dir: web
    desc: Auto-fix Biome issues (unsafe, may change code semantics)
    deps: [deps]
    cmds:
      - pnpm lint:unsafe

  test:
    dir: web
    desc: Run web unit tests (Vitest)
    deps: [deps]
    cmds:
      - pnpm test --run

  e2e:deps:
    dir: web
    desc: Ensure Playwright browsers and deps installed for E2E
    run: once
    deps: [deps]
    cmds:
      - pnpm exec playwright install --with-deps || pnpm exec playwright install

  e2e:dev:
    dir: web
    aliases: [e2e]
    desc: Run Web E2E against dev stack (Vite/HMR)
    deps: [":docker:up:dev", "e2e:deps"]
    cmds:
      - env WEB_PORT={{.WEB_PORT}} PLAYWRIGHT_FORCE_TTY=false pnpm e2e

  e2e:preview:
    dir: web
    desc: Run Web E2E against preview stack (compiled SPA)
    deps: [":docker:up:preview", "e2e:deps"]
    cmds:
      - env GATEWAY_PORT={{.GATEWAY_PORT}} PLAYWRIGHT_FORCE_TTY=false pnpm e2e

  test:all:
    desc: Run all tests in parallel
    deps: [test, e2e:dev]
