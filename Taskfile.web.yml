version: "3"

env:
  WEB_PORT: "{{.WEB_PORT | default 5223}}"
  GATEWAY_PORT: "{{.GATEWAY_PORT | default 8447}}"
  MOCK_OAUTH_PORT: "{{.MOCK_OAUTH_PORT | default 3345}}"
  TEST_GATEWAY_PORT: "{{.TEST_GATEWAY_PORT | default 9447}}"
  TEST_MOCK_OAUTH_PORT: "{{.TEST_MOCK_OAUTH_PORT | default 9345}}"

tasks:
  deps:
    dir: web
    desc: Install web dependencies (pnpm)
    run: once
    cmds:
      - pnpm install --frozen-lockfile
    sources:
      - package.json
      - pnpm-lock.yaml
      - ../Taskfile.web.yml

  generate:
    dir: web
    desc: Generate code
    deps: [":go:generate", generate:openapi, generate:types, generate:client]

  generate:openapi:
    dir: web
    desc: Convert swagger.json to OpenAPI client + TS types
    deps: [deps, ":go:generate"]
    sources:
      - ../Taskfile.web.yml
      - ../internal/gateway/openapi/generated/swagger.json
    generates:
      - src/api/openapi.json
    cmds: [pnpm generate:openapi]

  generate:types:
    dir: web
    desc: Generate TypeScript types from OpenAPI schema
    deps: [generate:openapi]
    sources:
      - ../Taskfile.web.yml
      - src/api/openapi.json
    generates:
      - src/api/types.generated.ts
    cmds: [pnpm generate:types]

  generate:client:
    dir: web
    desc: Generate OpenAPI client from OpenAPI schema
    deps: [generate:openapi]
    sources:
      - ../Taskfile.web.yml
      - ../internal/gateway/openapi/generated/swagger.json
      - orval.config.ts
      - src/api/http-client.ts
    generates:
      - src/api/generated.ts
      - src/api/schemas/**/*.ts
    cmds: [pnpm generate:client]

  build:
    dir: web
    desc: Build the web SPA with Vite
    deps: [deps, ":go:generate"]
    sources:
      - ../Taskfile.web.yml
      - package.json
      - pnpm-lock.yaml
      - tsconfig*.json
      - vite.config.ts
      - src/**/*
      - public/**/*
    generates:
      - dist/**/*
    cmds: [pnpm build]

  lint:
    desc: Run TypeScript typecheck and Biome lint
    deps: [lint:typecheck, lint:biome]

  lint:fix:
    desc: Run TypeScript typecheck and auto-fix Biome issues (safe)
    deps: [lint:typecheck, lint:biome:fix]

  lint:typecheck:
    dir: web
    desc: Run TypeScript type checking
    deps: [deps, ":go:generate"]
    cmds: [pnpm typecheck]

  lint:biome:
    dir: web
    desc: Run Biome lint
    deps: [deps]
    cmds: [pnpm lint]

  lint:biome:fix:
    dir: web
    desc: Run Biome lint
    deps: [deps]
    cmds: [pnpm lint:fix]

  format:
    dir: web
    desc: Format web code (Biome + Prettier equivalents)
    deps: [deps]
    cmds: [pnpm format]

  lint:unsafe:
    dir: web
    desc: Auto-fix Biome issues (unsafe, may change code semantics)
    deps: [deps]
    cmds: [pnpm lint:unsafe]

  test:
    dir: web
    desc: Run web unit tests (Vitest)
    deps: [deps, ":go:generate"]
    cmds: [pnpm test --run]

  e2e:deps:
    dir: web
    desc: Ensure Playwright browsers and deps installed for E2E
    run: once
    deps: [deps]
    sources:
      - ../Taskfile.web.yml
      - package.json
      - pnpm-lock.yaml
      - playwright.config.ts
    cmds:
      - pnpm exec playwright install --with-deps || pnpm exec playwright install

  e2e:
    dir: web
    desc: Run Web E2E against dedicated test stack (preview-style)
    deps: [":docker:up:test", ":docker:wait:test", "e2e:deps", ":go:generate"]
    cmds:
      - env GATEWAY_PORT={{.TEST_GATEWAY_PORT}} WEB_PORT={{.TEST_GATEWAY_PORT}} MOCK_OAUTH_PORT={{.TEST_MOCK_OAUTH_PORT}} PLAYWRIGHT_BASE_URL=http://localhost:{{.TEST_GATEWAY_PORT}} E2E_DATABASE_URL=postgres://postgres:postgres@127.0.0.1:55432/gateway_test?sslmode=disable DATABASE_URL=postgres://postgres:postgres@127.0.0.1:55432/gateway_test?sslmode=disable PLAYWRIGHT_FORCE_TTY=false pnpm e2e

  test:all:
    desc: Run all tests in parallel
    deps: [test, e2e]
