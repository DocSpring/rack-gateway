version: "3"

env:
  WEB_PORT: "{{.WEB_PORT | default 5223}}"
  GATEWAY_PORT: "{{.GATEWAY_PORT | default 8447}}"
  MOCK_OAUTH_PORT: "{{.MOCK_OAUTH_PORT | default 3345}}"
  TEST_GATEWAY_PORT: "{{.TEST_GATEWAY_PORT | default 9447}}"
  TEST_MOCK_OAUTH_PORT: "{{.TEST_MOCK_OAUTH_PORT | default 9345}}"

tasks:
  deps:
    dir: web
    desc: Install web dependencies (Bun)
    run: once
    cmds:
      - bun install --frozen-lockfile
    sources:
      - package.json
      - bun.lock
      - ../Taskfile.web.yml

  generate:
    dir: web
    desc: Generate code
    deps: [":go:generate", generate:openapi, generate:types, generate:client]

  generate:openapi:
    dir: web
    desc: Convert swagger.json to OpenAPI client + TS types
    deps: [deps, ":go:generate"]
    sources:
      - ../Taskfile.web.yml
      - ../internal/gateway/openapi/generated/swagger.json
    generates:
      - src/api/openapi.json
    cmds: [bun run generate:openapi]

  generate:types:
    dir: web
    desc: Generate TypeScript types from OpenAPI schema
    deps: [generate:openapi]
    sources:
      - ../Taskfile.web.yml
      - src/api/openapi.json
    generates:
      - src/api/types.generated.ts
    cmds: [bun run generate:types]

  generate:client:
    dir: web
    desc: Generate OpenAPI client from OpenAPI schema
    deps: [generate:openapi]
    sources:
      - ../Taskfile.web.yml
      - ../internal/gateway/openapi/generated/swagger.json
      - orval.config.ts
      - src/api/http-client.ts
    generates:
      - src/api/generated.ts
      - src/api/schemas/**/*.ts
    cmds: [bun run generate:client]

  build:
    dir: web
    desc: Build the web SPA with Vite
    deps: [deps, ":go:generate"]
    sources:
      - ../Taskfile.web.yml
      - package.json
      - bun.lock
      - tsconfig*.json
      - vite.config.ts
      - src/**/*
      - public/**/*
    generates:
      - dist/**/*
    cmds: [bun run build]

  lint:
    desc: Run TypeScript typecheck, Biome lint, and knip
    deps: [lint:typecheck, lint:biome, lint:knip]

  lint:fix:
    desc: Run TypeScript typecheck, auto-fix Biome issues, and knip (safe)
    deps: [lint:typecheck, lint:biome:fix, lint:knip]

  lint:typecheck:
    dir: web
    desc: Run TypeScript type checking
    deps: [deps, ":go:generate"]
    cmds: [bun run typecheck]

  lint:biome:
    dir: web
    desc: Run Biome lint
    deps: [deps]
    cmds: [bun run lint]

  lint:biome:fix:
    dir: web
    desc: Run Biome lint
    deps: [deps]
    cmds: [bun run lint:fix]

  lint:knip:
    dir: web
    desc: Run knip to find unused files and exports
    deps: [deps]
    cmds: [bun run knip]

  check-ignores:
    desc: Check for biome-ignore comments (zero tolerance)
    cmds:
      - scripts/check_biome_ignores.sh

  duplication:
    desc: Check for web code duplication
    dir: web
    cmds:
      - jscpd --silent .

  format:
    dir: web
    desc: Format web code (Biome + Prettier equivalents)
    deps: [deps]
    cmds: [bun run format]

  lint:unsafe:
    dir: web
    desc: Auto-fix Biome issues (unsafe, may change code semantics)
    deps: [deps]
    cmds: [bun run lint:unsafe]

  test:
    dir: web
    desc: Run web unit tests (Vitest)
    deps: [deps, ":go:generate"]
    cmds: [bunx vitest --run]

  e2e:deps:
    dir: web
    desc: Ensure Playwright browsers and deps installed for E2E
    run: once
    deps: [deps]
    sources:
      - ../Taskfile.web.yml
      - package.json
      - bun.lock
      - playwright.config.ts
    cmds:
      - bunx playwright install --with-deps || bunx playwright install

  e2e:
    dir: web
    desc: Run Web E2E against dedicated test stack (preview-style)
    deps: [":docker:test:up", ":docker:test:wait", "e2e:deps", ":go:generate"]
    cmds:
      - env TEST_GATEWAY_PORT={{.TEST_GATEWAY_PORT}} GATEWAY_PORT={{.TEST_GATEWAY_PORT}} WEB_PORT={{.TEST_GATEWAY_PORT}} MOCK_OAUTH_PORT={{.TEST_MOCK_OAUTH_PORT}} PLAYWRIGHT_BASE_URL=http://localhost:{{.TEST_GATEWAY_PORT}} E2E_DATABASE_URL=postgres://postgres:postgres@127.0.0.1:55432/gateway_test?sslmode=disable DATABASE_URL=postgres://postgres:postgres@127.0.0.1:55432/gateway_test?sslmode=disable TEST_DATABASE_URL=postgres://postgres:postgres@127.0.0.1:55432/gateway_test?sslmode=disable PLAYWRIGHT_FORCE_TTY=false bun run e2e {{.CLI_ARGS}}

  test:all:
    desc: Run all tests in parallel
    deps: [test, e2e]
