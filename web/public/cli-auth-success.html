<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/.gateway/web/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Authentication Complete</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background: #09090b;
        color: #fafafa;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji",
          "Segoe UI Emoji";
        display: grid;
        place-items: center;
      }
      .card {
        width: min(520px, calc(100% - 2rem));
        background: #111113;
        border: 1px solid #27272a;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        padding: 28px 24px;
        text-align: center;
      }
      .icon {
        display: inline-grid;
        place-items: center;
        width: 56px;
        height: 56px;
        border-radius: 999px;
        background: #16a34a; /* green-600 */
        color: white;
        margin: 0 auto 16px;
      }
      .icon svg {
        width: 28px;
        height: 28px;
      }
      h1 {
        font-size: 22px;
        margin: 0 0 8px;
      }
      p.sub {
        margin: 20px 0 7px;
        color: #a1a1aa;
      }
      .hint {
        font-size: 13px;
        color: #a1a1aa;
        margin-top: 12px;
      }
      .row {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-top: 8px;
        flex-wrap: wrap;
      }
      .btn {
        appearance: none;
        border: 1px solid #3f3f46;
        background: #18181b;
        color: #fafafa;
        padding: 10px 14px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
      }
      .btn:hover {
        background: #1f1f22;
        border-color: #52525b;
      }
      code {
        background: #18181b;
        border: 1px solid #27272a;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="card" role="dialog" aria-modal="true" aria-labelledby="title">
      <div class="icon" aria-hidden="true">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <path
            fill-rule="evenodd"
            d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12Zm13.36-2.59a.75.75 0 1 0-1.06-1.06l-4.72 4.72-1.78-1.78a.75.75 0 1 0-1.06 1.06l2.31 2.31c.293.293.767.293 1.06 0l5.25-5.25Z"
            clip-rule="evenodd"
          />
        </svg>
      </div>
      <h1 id="title">Authentication Complete</h1>
      <p class="sub">You can return to your terminal and close this window.</p>
    </div>
  </body>
</html>
