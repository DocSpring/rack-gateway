[env]
# Application configuration
PORT = "8447"
APP_ENV = "development"
DEV_MODE = "true"
LOG_LEVEL = "debug"

# OAuth configuration (override in mise.local.toml)
GOOGLE_CLIENT_ID = "mock-client-id"
GOOGLE_CLIENT_SECRET = "mock-client-secret"
GOOGLE_ALLOWED_DOMAIN = "company.com"
GOOGLE_OAUTH_BASE_URL = "http://localhost:3001"
REDIRECT_URL = "http://localhost:8447/v1/login/callback"

# JWT configuration
APP_JWT_KEY = "development-jwt-secret-key"

# Mock Convox rack (for development)
RACK_HOST = "http://localhost:5443"
RACK_TOKEN = "mock-rack-token-12345"
RACK_USERNAME = "convox"

# Database path for gateway server
CONVOX_GATEWAY_DB_PATH = "./data/db.sqlite"

# Config directory for CLI (stores config.json with tokens and rack settings)
CONVOX_GATEWAY_CLI_CONFIG_DIR = "./config/cli"
