[env]
# PORT CONFIGURATION - SINGLE SOURCE OF TRUTH
GATEWAY_PORT = "8447"
WEB_PORT = "5223"
MOCK_OAUTH_PORT = "3345"
MOCK_CONVOX_PORT = "5443"

# Application configuration
DEV_MODE = "true"
LOG_LEVEL = "debug"

# OAuth configuration (override in mise.local.toml)
GOOGLE_CLIENT_ID = "mock-client-id"
GOOGLE_CLIENT_SECRET = "mock-client-secret"
GOOGLE_ALLOWED_DOMAIN = "company.com"
GOOGLE_OAUTH_BASE_URL = "http://localhost:3345"

# JWT configuration
APP_JWT_KEY = "development-jwt-secret-key"

# Mock Convox rack (for development)
RACK_HOST = "http://localhost:5443"  # References MOCK_CONVOX_PORT
RACK_TOKEN = "mock-rack-token-12345"
RACK_USERNAME = "convox"

# Postgres for dev/test (Postgres.app default)
DATABASE_URL = "postgres://localhost:5432/postgres?sslmode=disable"

# Config directory for CLI (stores config.json with tokens and rack settings)
CONVOX_GATEWAY_CLI_CONFIG_DIR = "./config/cli"
