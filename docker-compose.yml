services:
  mock-oauth:
    build:
      context: ./dev/mock-oauth
    environment:
      PORT: ${MOCK_OAUTH_PORT:-3345}
      NODE_ENV: development
      # Internal issuer (for gateway OIDC)
      OAUTH_ISSUER: http://mock-oauth:${MOCK_OAUTH_PORT:-3345}
      # Browser-facing base (for redirects)
      OAUTH_BROWSER_BASE: http://localhost:${MOCK_OAUTH_PORT:-3345}
    ports:
      - "${MOCK_OAUTH_PORT:-3345}:${MOCK_OAUTH_PORT:-3345}"
    networks:
      - gateway-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:${MOCK_OAUTH_PORT:-3345}/health || exit 1",
        ]
      interval: 2s
      timeout: 5s
      retries: 30

  mock-convox:
    build:
      context: .
      dockerfile: Dockerfile.mock-convox
    environment:
      MOCK_CONVOX_PORT: ${MOCK_CONVOX_PORT:-5443}
      # Mock logging toggles
      MOCK_CONVOX_LOG_HEADERS: true
      MOCK_CONVOX_LOG_REQUEST_BODY: true
      MOCK_CONVOX_LOG_RESPONSE_BODY: true
    ports:
      - "${MOCK_CONVOX_PORT:-5443}:${MOCK_CONVOX_PORT:-5443}"
    networks:
      - gateway-net

  gateway-api:
    build:
      context: .
      dockerfile: Dockerfile.gateway-web
    image: ${GATEWAY_IMAGE:-convox-gateway-api:local}
    environment:
      PORT: ${GATEWAY_PORT:-8447}
      DEBUG_OAUTH: ${GATEWAY_DEBUG_OAUTH:-false}
      DEBUG_AUTH: ${GATEWAY_DEBUG_AUTH:-false}
      APP_JWT_KEY: dev-jwt-secret-key-change-in-production
      GOOGLE_CLIENT_ID: mock-client-id
      GOOGLE_CLIENT_SECRET: mock-client-secret
      GOOGLE_ALLOWED_DOMAIN: ${GOOGLE_ALLOWED_DOMAIN:-company.com}
      CONVOX_SECRET_ENV_VARS: DATABASE_URL,REDIS_URL,SECRET_KEY_BASE
      ADMIN_USERS: admin@company.com
      VIEWER_USERS: viewer@company.com
      DEPLOYER_USERS: deployer@company.com
      OPERATIONS_USERS: ops@company.com
      # Internal service URL for OIDC discovery/token endpoints
      GOOGLE_OAUTH_BASE_URL: http://mock-oauth:${MOCK_OAUTH_PORT:-3345}
      REDIRECT_URL: http://localhost:${GATEWAY_PORT:-8447}
      FRONTEND_BASE_URL: http://localhost:${GATEWAY_PORT:-8447}/.gateway/web/
      RACK: Dev # Convox sets this var automatically
      RACK_HOST: http://mock-convox:${MOCK_CONVOX_PORT:-5443}
      RACK_TOKEN: mock-rack-token-12345
      RACK_USERNAME: convox
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/gateway?sslmode=disable
      LOG_RESPONSE_BODIES: "true"
    ports:
      - "${GATEWAY_PORT:-8447}:${GATEWAY_PORT:-8447}"
    volumes: []
    depends_on:
      postgres:
        condition: service_healthy
      mock-convox:
        condition: service_started
      mock-oauth:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:${GATEWAY_PORT:-8447}/.gateway/api/health || exit 1",
        ]
      interval: 2s
      timeout: 5s
      retries: 3
    networks:
      - gateway-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gateway
    # Expose on a non-default host port to avoid conflicts with local Postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 50
    networks:
      - gateway-net

  web-dev:
    profiles: [dev]
    build:
      context: ./web
      dockerfile: Dockerfile.dev
      target: dev
    environment:
      # In dev profile, proxy API requests to gateway-api-dev (same Compose network)
      VITE_API_BASE_URL: http://gateway-api-dev:${GATEWAY_PORT:-8447}
      VITE_DEBUG_PROXY: ${VITE_DEBUG_PROXY:-false}
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
    command: pnpm dev --host 0.0.0.0
    networks:
      - gateway-net

  # Optional: precompiled static preview for E2E (build + serve dist)
  web-preview:
    profiles: [preview]
    build:
      context: ./web
      dockerfile: Dockerfile.dev
      target: dev
    environment:
      # Build-time base URL for API calls in the compiled SPA
      VITE_API_BASE_URL: http://localhost:${GATEWAY_PORT:-8447}
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
    command: sh -lc "pnpm build && pnpm preview --host 0.0.0.0 --port 5173"
    networks:
      - gateway-net

  gateway-api-dev:
    profiles: [dev]
    build:
      context: .
      dockerfile: Dockerfile.gateway-dev
    environment:
      PORT: ${GATEWAY_PORT:-8447}
      DEBUG_OAUTH: ${GATEWAY_DEBUG_OAUTH:-false}
      APP_JWT_KEY: dev-jwt-secret-key-change-in-production
      GOOGLE_CLIENT_ID: mock-client-id
      GOOGLE_CLIENT_SECRET: mock-client-secret
      GOOGLE_ALLOWED_DOMAIN: ${GOOGLE_ALLOWED_DOMAIN:-company.com}
      CONVOX_SECRET_ENV_VARS: DATABASE_URL,REDIS_URL,SECRET_KEY_BASE
      ADMIN_USERS: admin@company.com
      VIEWER_USERS: viewer@company.com
      DEPLOYER_USERS: deployer@company.com
      OPERATIONS_USERS: ops@company.com
      GOOGLE_OAUTH_BASE_URL: http://mock-oauth:${MOCK_OAUTH_PORT:-3345}
      REDIRECT_URL: http://localhost:${GATEWAY_PORT:-8447}
      FRONTEND_BASE_URL: http://localhost:${WEB_PORT:-5173}
      RACK: Dev
      RACK_HOST: http://mock-convox:${MOCK_CONVOX_PORT:-5443}
      RACK_TOKEN: mock-rack-token-12345
      RACK_USERNAME: convox
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/gateway?sslmode=disable
      DEV_MODE: "true"
      LOG_RESPONSE_BODIES: "true"
      WEB_DEV_SERVER_URL: http://web-dev:5173
    ports:
      - "${GATEWAY_PORT:-8447}:${GATEWAY_PORT:-8447}"
    depends_on:
      postgres:
        condition: service_healthy
      mock-convox:
        condition: service_started
      mock-oauth:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:${GATEWAY_PORT:-8447}/.gateway/api/health || exit 1",
        ]
      interval: 2s
      timeout: 5s
      retries: 3
    networks:
      - gateway-net

networks:
  gateway-net:
    driver: bridge
