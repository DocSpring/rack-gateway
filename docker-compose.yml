services:
  mock-oauth:
    build:
      context: ./dev/mock-oauth
    environment:
      PORT: 3001
      NODE_ENV: development
      OAUTH_ISSUER: http://localhost:3001
    ports:
      - "3001:3001"
    networks:
      - gateway-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  mock-convox:
    build:
      context: .
      dockerfile: Dockerfile.mock
    environment:
      MOCK_CONVOX_PORT: 5443
    ports:
      - "5443:5443"
    networks:
      - gateway-net

  gateway-api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 8447
      APP_ENV: development
      APP_JWT_KEY: dev-jwt-secret-key-change-in-production
      GOOGLE_CLIENT_ID: mock-client-id
      GOOGLE_CLIENT_SECRET: mock-client-secret  
      GOOGLE_ALLOWED_DOMAIN: ${GOOGLE_ALLOWED_DOMAIN:-company.com}
      GOOGLE_OAUTH_BASE_URL: http://localhost:3001
      REDIRECT_URL: http://localhost:8447/.gateway/login/callback
      RACK_HOST: http://mock-convox:5443
      RACK_TOKEN: mock-rack-token-12345
      RACK_USERNAME: convox
      CONVOX_GATEWAY_DB_PATH: /app/data/db.sqlite
      DEV_MODE: "true"
    ports:
      - "8447:8447"
    volumes:
      - ./data:/app/data
    depends_on:
      - mock-convox
      - mock-oauth
    networks:
      - gateway-net

  web-dev:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
      target: dev
    environment:
      VITE_API_BASE_URL: http://localhost:8447
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
    command: pnpm dev --host 0.0.0.0
    depends_on:
      - gateway-api
    networks:
      - gateway-net

networks:
  gateway-net:
    driver: bridge
