# RBAC Policies for Convox Gateway
# Based on actual Convox CLI commands

viewer:
  name: viewer
  description: Read-only access to apps and logs
  commands:
    # App viewing
    - "apps"
    - "apps info"
    - "apps params"
    
    # Process viewing
    - "ps"
    - "ps info"
    
    # Logs viewing
    - "logs"
    - "builds logs"
    - "rack logs"
    
    # Release and build info
    - "releases"
    - "releases info"
    - "releases manifest"
    - "builds"
    - "builds info"
    
    # Service and resource info
    - "services"
    - "resources"
    - "resources info"
    - "balancers"
    
    # Environment viewing
    - "env"
    - "env get"
    
    # General info
    - "rack"
    - "version"
    - "help"

ops:
  name: ops
  description: Operations team - can restart and debug apps
  inherits: viewer
  commands:
    # Process management
    - "ps stop"
    - "restart"
    - "services restart"
    
    # Debugging
    - "exec"
    - "run"
    - "proxy"
    - "resources proxy"
    - "resources console"
    
    # Instance access (for debugging)
    - "instances"
    - "instances ssh"
    
    # Config viewing (not setting)
    - "config get"
    - "configs"
    
    # Certificate viewing
    - "certs"
    - "ssl"

deployer:
  name: deployer
  description: Can deploy apps and manage configurations
  inherits: ops
  commands:
    # Build and deploy
    - "build"
    - "deploy"
    - "releases promote"
    - "releases rollback"
    
    # Environment management
    - "env set"
    - "env unset"
    - "env edit"
    
    # Config management
    - "config set"
    
    # App management
    - "apps create"
    - "apps cancel"
    - "apps lock"
    - "apps unlock"
    - "scale"
    
    # Certificate management
    - "certs generate"
    - "certs import"
    - "certs renew"
    - "ssl update"
    
    # Import/Export
    - "apps export"
    - "apps import"
    - "builds export"
    - "builds import"
    - "resources export"
    - "resources import"
    
    # File operations
    - "cp"

admin:
  name: admin
  description: Full admin access
  inherits: deployer
  commands:
    # Destructive operations
    - "apps delete"
    - "certs delete"
    
    # App parameters (infrastructure changes)
    - "apps params set"
    
    # Instance management
    - "instances terminate"
    - "instances keyroll"
    
    # Registry management
    - "registries"
    - "registries add"
    - "registries remove"
    
    # API access (dangerous)
    - "api get"
    
    # All commands (wildcard)
    - "*"

# Blocked commands for all users (only infrastructure team)
blocked:
  description: Commands that should never be allowed through the gateway
  commands:
    - "rack install"
    - "rack uninstall"
    - "rack update"
    - "rack params set"
    - "rack scale"
    - "rack mv"
    - "rack access"
    - "rack access key rotate"
    - "rack kubeconfig"
    - "rack runtime attach"
    - "rack sync"
    - "letsencrypt*"
    - "login"  # Use convox-gateway login instead
    - "switch" # Managed by convox-gateway
    - "update" # CLI updates should be controlled