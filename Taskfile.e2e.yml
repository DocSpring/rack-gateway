version: '3'

env:
  WEB_PORT: '{{.WEB_PORT | default 5173}}'
  GATEWAY_PORT: '{{.GATEWAY_PORT | default 8447}}'
  MOCK_OAUTH_PORT: '{{.MOCK_OAUTH_PORT | default 3345}}'

tasks:
  _wait:
    desc: Wait for services to become ready (gateway, web, mock-oauth)
    cmds:
      - WEB_PORT={{.WEB_PORT}} GATEWAY_PORT={{.GATEWAY_PORT}} MOCK_OAUTH_PORT={{.MOCK_OAUTH_PORT}} bash scripts/wait-services.sh

  _install-playwright:
    dir: web
    desc: Ensure Playwright and deps installed
    cmds:
      - pnpm install --frozen-lockfile
      - pnpm exec playwright install --with-deps || pnpm exec playwright install

  web:dev:
    desc: Run Web E2E against dev stack (Vite)
    cmds:
      - task: _free-prod
      - docker compose up -d --build mock-oauth mock-convox gateway-api-dev web-dev
      - task: _wait
      - task: _install-playwright
      - cmd: |
          cd web && env WEB_PORT={{.WEB_PORT}} pnpm e2e
        ignore_error: false

  web:release:
    desc: Run Web E2E against prod-like stack (compiled SPA)
    cmds:
      - task: _free-dev
      - docker compose up -d --build mock-oauth mock-convox gateway-api
      - cmd: |
          CHECK_VITE_PROXY=false WEB_PORT={{.GATEWAY_PORT}} GATEWAY_PORT={{.GATEWAY_PORT}} MOCK_OAUTH_PORT={{.MOCK_OAUTH_PORT}} bash scripts/wait-services.sh
      - task: _install-playwright
      - cmd: |
          cd web && env GATEWAY_PORT={{.GATEWAY_PORT}} pnpm e2e
        ignore_error: false

  _free-prod:
    desc: Ensure prod gateway-api not occupying port
    cmds:
      - |
        docker compose ps -q gateway-api >/dev/null 2>&1 && (docker compose stop gateway-api && docker compose rm -f gateway-api) || true

  _free-dev:
    desc: Ensure dev gateway-api-dev not occupying port
    cmds:
      - |
        docker compose ps -q gateway-api-dev >/dev/null 2>&1 && (docker compose stop gateway-api-dev && docker compose rm -f gateway-api-dev) || true

  cli:
    desc: Run CLI E2E flow on dev stack
    cmds:
      - task: _free-prod
      - docker compose up -d --build mock-oauth mock-convox gateway-api-dev web-dev
      - task: _wait
      - bash scripts/cli-e2e.sh

