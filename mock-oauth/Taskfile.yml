version: "3"
run: once

tasks:
  deps:
    dir: mock-oauth
    desc: Install dependencies for mock OAuth server
    sources:
      - package.json
      - bun.lock
      - ../mock-oauth/Taskfile.yml
    cmds:
      - bun install

  build:
    dir: mock-oauth
    desc: Build the TypeScript mock OAuth server
    deps: [deps]
    sources:
      - package.json
      - bun.lock
      - tsconfig.json
      - tsconfig.build.json
      - ../mock-oauth/Taskfile.yml
      - "*.ts"
    generates:
      - dist/**/*
    cmds:
      - bun run build

  test:
    dir: mock-oauth
    desc: Run mock OAuth server unit tests
    deps: [deps]
    cmds:
      - NODE_ENV=test bun run test

  lint:
    desc: Run TypeScript typecheck and Biome lint
    deps: [lint:typecheck, lint:biome]

  lint:fix:
    desc: Run TypeScript typecheck and auto-fix Biome issues (safe)
    deps: [lint:typecheck, lint:biome:fix]

  lint:typecheck:
    dir: mock-oauth
    desc: Run TypeScript type checking
    deps: [deps]
    cmds:
      - bun run typecheck

  lint:biome:
    dir: mock-oauth
    desc: Run Biome lint
    deps: [deps]
    cmds:
      - bun run lint

  lint:biome:fix:
    dir: mock-oauth
    desc: Lint mock OAuth server and apply safe fixes
    deps: [deps]
    cmds:
      - bun run lint:fix

  format:
    dir: mock-oauth
    desc: Format mock OAuth code (Biome)
    deps: [deps]
    cmds:
      - bun run format

  dev:
    dir: mock-oauth
    desc: Run mock OAuth server in watch mode
    deps: [deps]
    cmds:
      - bun run dev
