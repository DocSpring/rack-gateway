version: "3"
run: once

tasks:
  deps:
    desc: Install Go module dependencies
    sources:
      - go.*
      - Taskfile.go.yml
    cmds:
      - go mod download
      - go mod tidy

  tools:
    desc: Install Go tooling
    cmds:
      - go install honnef.co/go/tools/cmd/staticcheck@latest
      - go install gotest.tools/gotestsum@latest
      - go install github.com/tkrajina/typescriptify-golang-structs/tscriptify@latest

  generate:
    desc: Generate code
    deps: [generate:types, generate:swagger]

  generate:types:
    desc: Generate TypeScript models from Go structs
    deps: [deps]
    sources:
      - go.*
      - Taskfile.go.yml
      - internal/tools/typescriptify/**/*.go
      - internal/gateway/db/**/*.go
      - internal/gateway/token/**/*.go
    generates:
      - web/src/lib/generated/gateway-types.ts
    cmds:
      - go run ./internal/tools/typescriptify
      - echo >> web/src/lib/generated/gateway-types.ts

  generate:swagger:
    desc: Generate OpenAPI swagger v2.0 schema from Gin annotations
    deps: [deps]
    sources:
      - go.*
      - Taskfile.go.yml
      - cmd/gateway/**/*.go
      - internal/**/*.go
      - internal/gateway/openapi/doc.go
    generates:
      - internal/gateway/openapi/generated/swagger.json
    cmds:
      - go generate ./internal/gateway/openapi
      - echo >> internal/gateway/openapi/generated/swagger.json

  build:
    desc: Build Go binaries (gateway, cli, mock)
    deps: [build:gateway, build:cli, build:mock]

  build:gateway:
    desc: Build gateway API server -> bin/convox-gateway-api
    deps: [deps]
    sources:
      - go.*
      - Taskfile.go.yml
      - cmd/gateway/**/*.go
      - internal/**/*.go
    generates:
      - bin/convox-gateway-api
    cmds:
      - go build -o bin/convox-gateway-api ./cmd/gateway/

  build:cli:
    desc: Build gateway CLI -> bin/convox-gateway
    deps: [deps]
    sources:
      - go.*
      - Taskfile.go.yml
      - cmd/cli/**/*.go
      - internal/**/*.go
    generates:
      - bin/convox-gateway
    cmds:
      - go build -ldflags "-X main.Version=1.0.0 -X main.BuildTime=$(date -u '+%Y-%m-%d_%H:%M:%S')" -o bin/convox-gateway ./cmd/cli/

  build:mock:
    desc: Build mock Convox server -> bin/mock-convox
    deps: [deps]
    sources:
      - go.*
      - Taskfile.go.yml
      - cmd/mock-convox/**/*.go
      - internal/**/*.go
    generates:
      - bin/mock-convox
    cmds:
      - go build -o bin/mock-convox ./cmd/mock-convox/

  test:
    desc: Run Go unit and integration tests safely
    deps: [deps]
    sources:
      - Taskfile.go.yml
      - go.*
      - cmd/**/*.go
      - internal/**/*.go
      - scripts/**/*.sh
    cmds:
      - ./scripts/safe-test.sh -v -race -short -timeout 30s ./cmd/gateway/... ./cmd/cli/... ./cmd/mock-convox/... ./internal/gateway/... ./internal/integration/...
      - ./scripts/safe-test.sh -v -race -tags=integration -timeout 30s ./internal/integration/...

  lint:
    aliases: [lint:fix]
    desc: Run Go vet/fmt/staticcheck
    deps: [deps]
    sources:
      - Taskfile.go.yml
      - go.*
      - cmd/**/*.go
      - internal/**/*.go
    cmds:
      - golangci-lint run ./...

  e2e:dev:
    aliases: [e2e]
    desc: Run CLI E2E flow on dev stack
    deps: [":docker:up:dev"]
    sources:
      - Taskfile.go.yml
      - go.*
      - cmd/**/*.go
      - internal/**/*.go
      - scripts/cli-e2e.sh
    cmds: [scripts/cli-e2e.sh]

  e2e:dev:admin:
    desc: Run CLI E2E flow on dev stack with only admin tests
    deps: [":docker:up:dev"]
    sources:
      - Taskfile.go.yml
      - go.*
      - cmd/**/*.go
      - internal/**/*.go
      - scripts/cli-e2e.sh
    cmds: [ONLY_ADMIN_TESTS=true bash scripts/cli-e2e.sh]

  e2e:dev:api-token:
    desc: Run CLI E2E flow on dev stack with only API token tests
    deps: [":docker:up:dev"]
    sources:
      - Taskfile.go.yml
      - go.*
      - cmd/**/*.go
      - internal/**/*.go
      - scripts/cli-e2e.sh
    cmds: [ONLY_API_TOKEN_TESTS=true bash scripts/cli-e2e.sh]

  e2e:dev:deployer:
    desc: Run CLI E2E flow on dev stack with only deployer tests
    deps: [":docker:up:dev"]
    sources:
      - Taskfile.go.yml
      - go.*
      - cmd/**/*.go
      - internal/**/*.go
      - scripts/cli-e2e.sh
    cmds: [ONLY_DEPLOYER_TESTS=true bash scripts/cli-e2e.sh]

  e2e:dev:viewer:
    desc: Run CLI E2E flow on dev stack with only viewer tests
    deps: [":docker:up:dev"]
    sources:
      - Taskfile.go.yml
      - go.*
      - cmd/**/*.go
      - internal/**/*.go
      - scripts/cli-e2e.sh
    cmds: [ONLY_VIEWER_TESTS=true bash scripts/cli-e2e.sh]

  e2e:preview:
    desc: Run CLI E2E flow on preview stack
    deps: [":docker:up:preview"]
    sources:
      - Taskfile.go.yml
      - go.*
      - cmd/**/*.go
      - internal/**/*.go
      - scripts/cli-e2e.sh
    cmds: [scripts/cli-e2e.sh]

  test:all:
    desc: Run all tests in parallel
    deps: [test, e2e:dev]
