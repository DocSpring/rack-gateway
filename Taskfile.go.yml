version: "3"

tasks:
  deps:
    desc: Install Go module dependencies
    run: once
    cmds:
      - go mod download
      - go mod tidy

  tools:
    desc: Install Go tooling
    cmds:
      - go install honnef.co/go/tools/cmd/staticcheck@latest
      - go install gotest.tools/gotestsum@latest
      - go install github.com/tkrajina/typescriptify-golang-structs/tscriptify@latest

  types:export:
    desc: Generate TypeScript models from Go structs
    deps: [deps]
    cmds:
      - go run ./internal/tools/typescriptify

  build:
    desc: Build Go binaries (gateway, cli, mock)
    deps: [build:gateway, build:cli, build:mock]

  build:gateway:
    desc: Build gateway API server -> bin/convox-gateway-api
    deps: [deps]
    cmds:
      - go build -o bin/convox-gateway-api ./cmd/gateway/

  build:cli:
    desc: Build gateway CLI -> bin/convox-gateway
    deps: [deps]
    cmds:
      - go build -ldflags "-X main.Version=1.0.0 -X main.BuildTime=$(date -u '+%Y-%m-%d_%H:%M:%S')" -o bin/convox-gateway ./cmd/cli/

  build:mock:
    desc: Build mock Convox server -> bin/mock-convox
    deps: [deps]
    cmds:
      - go build -o bin/mock-convox ./cmd/mock-convox/

  test:
    desc: Run Go unit and integration tests safely
    deps: [deps]
    cmds:
      - ./scripts/safe-test.sh -v -race -short -timeout 30s ./cmd/gateway/... ./cmd/cli/... ./cmd/mock-convox/... ./internal/gateway/... ./internal/integration/...
      - ./scripts/safe-test.sh -v -race -tags=integration -timeout 30s ./internal/integration/...

  lint:
    aliases: [lint:fix]
    desc: Run Go vet/fmt/staticcheck
    deps: [deps]
    cmds:
      - go vet ./...
      - go fmt ./...
      - staticcheck ./...

  e2e:dev:
    aliases: [e2e]
    desc: Run CLI E2E flow on dev stack
    deps: [":docker:up:dev"]
    cmds: [scripts/cli-e2e.sh]

  e2e:dev:admin:
    desc: Run CLI E2E flow on dev stack with only admin tests
    deps: [":docker:up:dev"]
    cmds: [ONLY_ADMIN_TESTS=true bash scripts/cli-e2e.sh]

  e2e:dev:api-token:
    desc: Run CLI E2E flow on dev stack with only API token tests
    deps: [":docker:up:dev"]
    cmds: [ONLY_API_TOKEN_TESTS=true bash scripts/cli-e2e.sh]

  e2e:dev:deployer:
    desc: Run CLI E2E flow on dev stack with only deployer tests
    deps: [":docker:up:dev"]
    cmds: [ONLY_DEPLOYER_TESTS=true bash scripts/cli-e2e.sh]

  e2e:dev:viewer:
    desc: Run CLI E2E flow on dev stack with only viewer tests
    deps: [":docker:up:dev"]
    cmds: [ONLY_VIEWER_TESTS=true bash scripts/cli-e2e.sh]

  e2e:preview:
    desc: Run CLI E2E flow on preview stack
    deps: [":docker:up:preview"]
    cmds: [scripts/cli-e2e.sh]
