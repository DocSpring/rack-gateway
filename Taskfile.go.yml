version: "3"
run: once

tasks:
  deps:
    desc: Install Go module dependencies
    sources:
      - go.*
      - Taskfile.go.yml
    cmds:
      - go mod download
      - go mod tidy

  tools:
    desc: Install Go tooling
    cmds:
      - go install honnef.co/go/tools/cmd/staticcheck@latest
      - go install gotest.tools/gotestsum@latest
      - go install github.com/tkrajina/typescriptify-golang-structs/tscriptify@latest
      - go install golang.org/x/tools/cmd/goimports@latest

  install:
    aliases: [":install"]
    desc: Install Rack Gateway CLI
    deps: [deps]
    cmds:
      - ./scripts/install.sh

  generate:
    desc: Generate code
    deps: [generate:types, generate:swagger]

  generate:types:
    desc: Generate TypeScript models from Go structs
    deps: [deps]
    sources:
      - go.*
      - Taskfile.go.yml
      - internal/tools/typescriptify/**/*.go
      - internal/gateway/db/**/*.go
      - internal/gateway/token/**/*.go
    generates:
      - web/src/lib/generated/gateway-types.ts
    cmds:
      - go run ./internal/tools/typescriptify
      - echo >> web/src/lib/generated/gateway-types.ts

  generate:swagger:
    desc: Generate OpenAPI swagger v2.0 schema from Gin annotations
    deps: [deps]
    sources:
      - go.*
      - Taskfile.go.yml
      - cmd/gateway/**/*.go
      - internal/**/*.go
      - internal/gateway/openapi/doc.go
    generates:
      - internal/gateway/openapi/generated/swagger.json
    cmds:
      - go generate ./internal/gateway/openapi
      - echo >> internal/gateway/openapi/generated/swagger.json

  build:
    desc: Build Go binaries (gateway, cli, mock)
    deps: [build:gateway, build:cli, build:mock]

  build:gateway:
    desc: Build gateway API server -> bin/rack-gateway-api
    deps: [deps]
    env:
      CGO_CFLAGS: "-Wno-deprecated-declarations"
    sources:
      - go.*
      - Taskfile.go.yml
      - cmd/gateway/**/*.go
      - internal/**/*.go
      - internal/gateway/db/migrations/**/*.sql
    generates:
      - bin/rack-gateway-api
    cmds:
      - go build -o bin/rack-gateway-api ./cmd/gateway/

  build:cli:
    desc: Build gateway CLI -> bin/rack-gateway
    deps: [deps]
    env:
      CGO_CFLAGS: "-Wno-deprecated-declarations"
    sources:
      - go.*
      - Taskfile.go.yml
      - cmd/rack-gateway/**/*.go
      - internal/**/*.go
    generates:
      - bin/rack-gateway
    cmds:
      - go build -ldflags "-X main.Version=1.0.0 -X main.BuildTime=$(date -u '+%Y-%m-%d_%H:%M:%S')" -o bin/rack-gateway ./cmd/rack-gateway/

  build:mock:
    desc: Build mock Convox server -> bin/mock-convox
    deps: [deps]
    env:
      CGO_CFLAGS: "-Wno-deprecated-declarations"
    sources:
      - go.*
      - Taskfile.go.yml
      - cmd/mock-convox/**/*.go
      - internal/**/*.go
    generates:
      - bin/mock-convox
    cmds:
      - go build -o bin/mock-convox ./cmd/mock-convox/

  test:
    desc: Run Go unit and integration tests safely
    env:
      CGO_CFLAGS: "-Wno-deprecated-declarations"
      TEST_DATABASE_URL: "{{.ENV.TEST_DATABASE_URL}}"
      DATABASE_URL: "{{if .ENV.TEST_DATABASE_URL}}{{.ENV.TEST_DATABASE_URL}}{{else}}{{.ENV.DATABASE_URL}}{{end}}"
    deps: [deps, build, ":db:ensure:test"]
    sources:
      - Taskfile.go.yml
      - go.*
      - cmd/**/*.go
      - internal/**/*.go
      - scripts/**/*.sh
    cmds:
      - ./scripts/safe-test.sh -v -race -short -timeout 30s ./cmd/gateway/... ./cmd/rack-gateway/... ./cmd/mock-convox/... ./internal/gateway/... ./internal/integration/...
      - ./scripts/safe-test.sh -v -race -tags=integration -timeout 30s ./internal/integration/...

  format:
    desc: Format Go code with gofmt
    cmds:
      - go fmt ./...

  imports:
    desc: Fix Go imports with goimports
    sources:
      - Taskfile.go.yml
      - go.*
      - cmd/**/*.go
      - internal/**/*.go
    cmds:
      - goimports -w .

  lint:
    desc: Run Go linters (check mode)
    deps: [deps]
    sources:
      - Taskfile.go.yml
      - go.*
      - cmd/**/*.go
      - internal/**/*.go
    cmds:
      - golangci-lint run ./...

  lint:fix:
    desc: Auto-fix Go formatting and lint issues
    deps: [deps, format]
    sources:
      - Taskfile.go.yml
      - go.*
      - cmd/**/*.go
      - internal/**/*.go
    cmds:
      - golangci-lint run --fix ./...

  e2e:
    desc: Run CLI E2E flow on test stack
    deps: [":docker:test:up", ":docker:test:wait", ":db:migrate:test"]
    cmds:
      - GATEWAY_PORT={{.TEST_GATEWAY_PORT | default "9447"}} MOCK_OAUTH_PORT={{.TEST_MOCK_OAUTH_PORT | default "9345"}} MOCK_CONVOX_PORT={{.TEST_MOCK_CONVOX_PORT | default "6443"}} E2E_DATABASE_NAME=gateway_test E2E_GATEWAY_SERVICE=gateway-api-test scripts/cli-e2e.sh

  e2e:admin:
    desc: Run CLI E2E flow on test stack with only admin tests
    deps: [":docker:test:up", ":docker:test:wait", ":db:migrate:test"]
    cmds:
      - GATEWAY_PORT={{.TEST_GATEWAY_PORT | default "9447"}} MOCK_OAUTH_PORT={{.TEST_MOCK_OAUTH_PORT | default "9345"}} MOCK_CONVOX_PORT={{.TEST_MOCK_CONVOX_PORT | default "6443"}} E2E_DATABASE_NAME=gateway_test E2E_GATEWAY_SERVICE=gateway-api-test ONLY_ADMIN_TESTS=true scripts/cli-e2e.sh

  e2e:api-token:
    desc: Run CLI E2E flow on test stack with only API token tests
    deps: [":docker:test:up", ":docker:test:wait", ":db:migrate:test"]
    cmds:
      - GATEWAY_PORT={{.TEST_GATEWAY_PORT | default "9447"}} MOCK_OAUTH_PORT={{.TEST_MOCK_OAUTH_PORT | default "9345"}} MOCK_CONVOX_PORT={{.TEST_MOCK_CONVOX_PORT | default "6443"}} E2E_DATABASE_NAME=gateway_test E2E_GATEWAY_SERVICE=gateway-api-test ONLY_API_TOKEN_TESTS=true scripts/cli-e2e.sh

  e2e:deployer:
    desc: Run CLI E2E flow on test stack with only deployer tests
    deps: [":docker:test:up", ":docker:test:wait", ":db:migrate:test"]
    cmds:
      - GATEWAY_PORT={{.TEST_GATEWAY_PORT | default "9447"}} MOCK_OAUTH_PORT={{.TEST_MOCK_OAUTH_PORT | default "9345"}} MOCK_CONVOX_PORT={{.TEST_MOCK_CONVOX_PORT | default "6443"}} E2E_DATABASE_NAME=gateway_test E2E_GATEWAY_SERVICE=gateway-api-test ONLY_DEPLOYER_TESTS=true scripts/cli-e2e.sh

  e2e:viewer:
    desc: Run CLI E2E flow on test stack with only viewer tests
    deps: [":docker:test:up", ":docker:test:wait", ":db:migrate:test"]
    cmds:
      - GATEWAY_PORT={{.TEST_GATEWAY_PORT | default "9447"}} MOCK_OAUTH_PORT={{.TEST_MOCK_OAUTH_PORT | default "9345"}} MOCK_CONVOX_PORT={{.TEST_MOCK_CONVOX_PORT | default "6443"}} E2E_DATABASE_NAME=gateway_test E2E_GATEWAY_SERVICE=gateway-api-test ONLY_VIEWER_TESTS=true scripts/cli-e2e.sh

  test:all:
    desc: Run all tests in parallel
    deps: [test, e2e]
