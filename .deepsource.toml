version = 1

test_patterns = [
  "web/src/**/*.test.tsx",
  "web/src/**/*.test.ts",
  "**/*_test.go"
]

[[analyzers]]
name = "javascript"

  [analyzers.meta]
  plugins = ["react"]
  environment = [
    "vitest",
    "nodejs"
  ]

[[analyzers]]
name = "go"

  [analyzers.meta]
  import_root = "github.com/DocSpring/rack-gateway"
  import_paths = ["github.com/DocSpring/rack-gateway/cmd", "github.com/DocSpring/rack-gateway/internal"]
