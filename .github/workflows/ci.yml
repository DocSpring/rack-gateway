name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/gateway_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Install Task
        run: |
          curl -sL https://taskfile.dev/install.sh | sh -s -- -b /usr/local/bin
          task --version

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5

      - name: Install Convox CLI
        run: |
          set -euo pipefail
          ARCH=$(uname -m)
          URL="https://github.com/convox/convox/releases/latest/download/convox-linux"
          if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
            URL="https://github.com/convox/convox/releases/latest/download/convox-linux-arm64"
          fi
          curl -fsSL "$URL" -o /tmp/convox
          sudo mv /tmp/convox /usr/local/bin/convox
          sudo chmod 755 /usr/local/bin/convox
          convox version || true

      - name: Pre-build binaries for integration tests
        run: task go:build

      - name: Go tests
        run: task go:test

  web-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable corepack
        run: corepack enable

      - name: Install Task
        run: |
          curl -sL https://taskfile.dev/install.sh | sh -s -- -b /usr/local/bin
          task --version

      - name: Web lint (Typecheck and Biome)
        run: task web:lint

      - name: Web tests
        run: task web:test

  mock-oauth-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable corepack
        run: corepack enable

      - name: Install Task
        run: |
          curl -sL https://taskfile.dev/install.sh | sh -s -- -b /usr/local/bin
          task --version

      - name: Mock OAuth lint (Typecheck and Biome)
        run: task mock-oauth:lint
