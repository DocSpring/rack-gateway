name: Web E2E

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Build and start dev stack
        run: docker compose up -d --build mock-oauth mock-convox gateway-api web-dev

      - name: Wait for services
        run: |
          chmod +x scripts/wait-services.sh
          WEB_PORT=${WEB_PORT:-5173} GATEWAY_PORT=${GATEWAY_PORT:-8447} MOCK_OAUTH_PORT=${MOCK_OAUTH_PORT:-3345} \
            bash scripts/wait-services.sh

      - name: Install Playwright and deps
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          npx playwright install --with-deps || npx playwright install

      - name: Run Playwright E2E
        working-directory: web
        run: pnpm e2e

      - name: Docker logs (on failure)
        if: failure()
        run: docker compose logs --no-color

      - name: Teardown
        if: always()
        run: docker compose down -v

