name: Web E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    timeout-minutes: 20
    env:
      WEB_PORT: 5173
      GATEWAY_PORT: 8447
      MOCK_OAUTH_PORT: 3345
      GATEWAY_DEBUG_OAUTH: "true"
      VITE_DEBUG_PROXY: "true"
      DEBUG: pw:api
      CHECK_VITE_PROXY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Build and start dev stack (gateway serves UI)
        run: docker compose up -d --build mock-oauth mock-convox gateway-api

      - name: Wait for Postgres
        run: |
          echo "Waiting for Postgres service on 5432..."
          for i in {1..60}; do
            (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1 && break || true
            sleep 1
          done

      - name: Wait for services
        run: |
          chmod +x scripts/wait-services.sh
          WEB_UI_PATH='/.gateway/web/' WEB_PORT=${GATEWAY_PORT} CHECK_VITE_PROXY=false bash scripts/wait-services.sh

      - name: Diagnose endpoints before E2E
        run: |
          set -x
          echo "docker compose ps"
          docker compose ps
          echo '--- gateway: /.gateway/api/health ---'
          curl -sv http://127.0.0.1:${GATEWAY_PORT}/.gateway/api/health || true
          echo '--- gateway: login redirect (GET) ---'
          curl -sv http://127.0.0.1:${GATEWAY_PORT}/.gateway/api/web/login -o /dev/null || true

      - name: Show test and config snippets
        run: |
          echo '--- playwright.config.ts ---'
          sed -n '1,120p' web/playwright.config.ts
          echo '--- health.spec.ts ---'
          sed -n '1,80p' web/e2e/health.spec.ts

      - name: Install Playwright and deps
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          npx playwright install --with-deps || npx playwright install

      - name: Run Playwright E2E
        working-directory: web
        run: WEB_PORT=${{ env.GATEWAY_PORT }} pnpm e2e

      - name: Docker logs (on failure)
        if: failure()
        run: docker compose logs --no-color

      - name: Teardown
        if: always()
        run: docker compose down -v
