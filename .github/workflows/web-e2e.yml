name: Web E2E

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      WEB_PORT: 5173
      GATEWAY_PORT: 8447
      MOCK_OAUTH_PORT: 3345
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Build and start dev stack
        run: docker compose up -d --build mock-oauth mock-convox gateway-api web-dev

      - name: Wait for services
        run: |
          chmod +x scripts/wait-services.sh
          bash scripts/wait-services.sh

      - name: Diagnose endpoints before E2E
        run: |
          set -x
          curl -sv http://127.0.0.1:${WEB_PORT}/ | head -n 5
          curl -sv http://127.0.0.1:${WEB_PORT}/api/.gateway/health || true
          curl -sv http://127.0.0.1:${WEB_PORT}/.gateway/health || true
          curl -sv http://127.0.0.1:${GATEWAY_PORT}/.gateway/health || true

      - name: Show test and config snippets
        run: |
          echo '--- playwright.config.ts ---'
          sed -n '1,120p' web/playwright.config.ts
          echo '--- health.spec.ts ---'
          sed -n '1,80p' web/e2e/health.spec.ts

      - name: Install Playwright and deps
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          npx playwright install --with-deps || npx playwright install

      - name: Run Playwright E2E
        working-directory: web
        run: pnpm e2e

      - name: Docker logs (on failure)
        if: failure()
        run: docker compose logs --no-color

      - name: Teardown
        if: always()
        run: docker compose down -v
