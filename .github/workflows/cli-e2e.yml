name: CLI E2E

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  cli-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      WEB_PORT: 5173
      GATEWAY_PORT: 8447
      MOCK_OAUTH_PORT: 3345
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Build and start dev stack
        run: docker compose up -d --build mock-oauth mock-convox gateway-api web-dev

      - name: Wait for services
        run: |
          chmod +x scripts/wait-services.sh
          bash scripts/wait-services.sh

      - name: Install Convox CLI
        run: |
          set -euo pipefail
          ARCH=$(uname -m)
          URL="https://github.com/convox/convox/releases/latest/download/convox-linux"
          if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
            URL="https://github.com/convox/convox/releases/latest/download/convox-linux-arm64"
          fi
          curl -fsSL "$URL" -o /tmp/convox
          sudo mv /tmp/convox /usr/local/bin/convox
          sudo chmod 755 /usr/local/bin/convox
          convox version || true

      - name: Run CLI E2E
        run: bash scripts/cli-e2e.sh

      - name: Docker logs (on failure)
        if: failure()
        run: docker compose logs --no-color

      - name: Teardown
        if: always()
        run: docker compose down -v
