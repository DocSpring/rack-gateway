root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/gateway"
  cmd = "mkdir -p ./tmp && CGO_CFLAGS=\"-Wno-deprecated-declarations\" go build -o ./tmp/gateway ./cmd/gateway"
  delay = 500
  exclude_dir = ["tmp", "vendor", "web", "node_modules", "mock-oauth", ".git", "reference"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = ["cmd", "internal", "taskfiles"]
  include_ext = ["go", "tpl", "tmpl", "html", "yml"]
  include_file = ["go.mod", "go.sum", "Taskfile.yml"]
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  # Set main_only to false if air is crashing
  main_only = true
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
