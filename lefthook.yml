pre-commit:
  parallel: true
  commands:
    fix-whitespace:
      file_types:
        - text
      exclude: "**/.*"
      run: scripts/fix_whitespace.sh {staged_files}
      stage_fixed: true

    go-format:
      glob: "**/*.go"
      run: go fmt {staged_files}
      stage_fixed: true

    go-imports:
      glob: "**/*.go"
      run: goimports -w {staged_files}
      stage_fixed: true

    go-lint:
      glob: "**/*.go"
      run: golangci-lint run --fix ./cmd/... ./internal/... ./tools/...
      stage_fixed: true

    go-test:
      glob: "**/*.go"
      run: task go:test

    golangci-config-verify:
      glob: ".golangci.yml"
      run: golangci-lint config verify

    biome-format:
      root: "web/"
      # Run across the web project every commit to avoid misses
      run: bunx biome format --write .

    biome-lint:
      root: "web/"
      # Run across the web project every commit to avoid misses
      run: bunx biome check --write .

    web-typecheck:
      root: "web/"
      glob: "**/*.{ts,tsx}"
      run: bunx tsc --noEmit

    web-knip:
      root: "web/"
      glob: "**/*.{ts,tsx,js,jsx,json}"
      run: bunx knip

    mock-oauth-test:
      glob: "mock-oauth/**/*.{ts,tsx}"
      run: task mock-oauth:test

    # Quality checks - zero tolerance
    code-duplication:
      glob: "**/*.{go,ts,tsx}"
      run: task duplication

    file-length:
      glob: "**/*"
      run: scripts/check_file_length.sh {staged_files}

    biome-ignores:
      root: "web/"
      glob: "**/*.{ts,tsx}"
      run: task check-ignores

    shellcheck:
      glob: "{*.sh,**/*.sh}"
      run: shellcheck {staged_files}

pre-push:
  parallel: false
  commands:
    # Run full CI suite
    ci:
      run: task ci

    # Scan for secrets before pushing
    secrets:
      run: task go:sec:secrets

    # Check for vulnerabilities
    vuln:
      run: task go:sec:vuln
