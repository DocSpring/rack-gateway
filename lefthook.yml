pre-commit:
  parallel: true
  commands:
    fix-whitespace:
      file_types:
        - text
      exclude: "**/.*"
      run: |
        for file in {staged_files}; do
          if [[ -f "$file" ]]; then
            # Remove trailing whitespace (portable sed usage)
            if [[ "$OSTYPE" == "darwin"* ]]; then
              sed -i '' 's/[[:space:]]*$//' "$file"
            else
              sed -i 's/[[:space:]]*$//' "$file"
            fi
            # Ensure file ends with newline
            if [[ -s "$file" ]] && [[ $(tail -c1 "$file" | wc -l) -eq 0 ]]; then
              echo >> "$file"
            fi
          fi
        done
      stage_fixed: true

    go-format:
      glob: "**/*.go"
      run: task go:format
      stage_fixed: true

    go-lint:
      glob: "**/*.go"
      run: task go:lint

    go-test:
      glob: "**/*.go"
      run: task go:test

    golangci-config-verify:
      glob: ".golangci.yml"
      run: golangci-lint config verify

    biome-format:
      root: "web/"
      # Run across the web project every commit to avoid misses
      run: pnpm biome format --write .

    biome-lint:
      root: "web/"
      # Run across the web project every commit to avoid misses
      run: pnpm biome check --write .

    web-typecheck:
      root: "web/"
      glob: "**/*.{ts,tsx}"
      run: pnpm tsc --noEmit
