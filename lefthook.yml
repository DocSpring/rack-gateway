pre-commit:
  parallel: true
  commands:
    go-fmt:
      glob: "**/*.go"
      run: gofmt -w {staged_files}
      stage_fixed: true

    go-vet:
      glob: "**/*.go"
      run: go vet ./...

    go-test:
      glob: "**/*.go"
      run: ./scripts/safe-test.sh -short ./...

    biome-format:
      root: "web/"
      # Run across the web project every commit to avoid misses
      run: pnpm biome format --write .

    biome-lint:
      root: "web/"
      # Run across the web project every commit to avoid misses
      run: pnpm biome check --write .

    web-typecheck:
      root: "web/"
      glob: "**/*.{ts,tsx}"
      run: pnpm tsc --noEmit
