pre-commit:
  parallel: true
  commands:
    fix-whitespace:
      file_types:
        - text
      exclude: "**/.*"
      run: |
        for file in {staged_files}; do
          if [[ -f "$file" ]]; then
            # Remove trailing whitespace (portable sed usage)
            if [[ "$OSTYPE" == "darwin"* ]]; then
              sed -i '' 's/[[:space:]]*$//' "$file"
            else
              sed -i 's/[[:space:]]*$//' "$file"
            fi
            # Ensure file ends with newline
            if [[ -s "$file" ]] && [[ $(tail -c1 "$file" | wc -l) -eq 0 ]]; then
              echo >> "$file"
            fi
          fi
        done
      stage_fixed: true

    go-fmt:
      glob: "**/*.go"
      run: gofmt -w {staged_files}
      stage_fixed: true

    go-vet:
      glob: "**/*.go"
      run: go vet ./...

    go-test:
      glob: "**/*.go"
      run: ./scripts/safe-test.sh -short ./...

    golangci-lint:
      glob: "**/*.go"
      run: |
        files=({staged_files})
        if [ ${#files[@]} -eq 0 ]; then
          exit 0
        fi
        dirs=$(printf '%s\n' "${files[@]}" | awk '{print "./"$0}' | xargs -n1 dirname | sort -u)
        targets=()
        for dir in $dirs; do
          if [ -d "$dir" ]; then
            targets+=("$dir")
          fi
        done
        if [ ${#targets[@]} -eq 0 ]; then
          exit 0
        fi
        golangci-lint run "${targets[@]}"

    golangci-config-verify:
      glob: ".golangci.yml"
      run: golangci-lint config verify

    biome-format:
      root: "web/"
      # Run across the web project every commit to avoid misses
      run: pnpm biome format --write .

    biome-lint:
      root: "web/"
      # Run across the web project every commit to avoid misses
      run: pnpm biome check --write .

    web-typecheck:
      root: "web/"
      glob: "**/*.{ts,tsx}"
      run: pnpm tsc --noEmit
