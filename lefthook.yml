pre-commit:
  parallel: true
  commands:
    fix-whitespace:
      file_types:
        - text
      exclude: "**/.*"
      run: |
        for file in {staged_files}; do
          if [[ -f "$file" ]]; then
            # Remove trailing whitespace (portable sed usage)
            if [[ "$OSTYPE" == "darwin"* ]]; then
              sed -i '' 's/[[:space:]]*$//' "$file"
            else
              sed -i 's/[[:space:]]*$//' "$file"
            fi
            # Ensure file ends with newline
            if [[ -s "$file" ]] && [[ $(tail -c1 "$file" | wc -l) -eq 0 ]]; then
              echo >> "$file"
            fi
          fi
        done
      stage_fixed: true

    go-format:
      glob: "**/*.go"
      run: task go:format
      stage_fixed: true

    go-imports:
      glob: "**/*.go"
      run: task go:imports
      stage_fixed: true

    go-lint:
      glob: "**/*.go"
      run: task go:lint

    go-test:
      glob: "**/*.go"
      run: task go:test

    golangci-config-verify:
      glob: ".golangci.yml"
      run: golangci-lint config verify

    biome-format:
      root: "web/"
      # Run across the web project every commit to avoid misses
      run: bunx biome format --write .

    biome-lint:
      root: "web/"
      # Run across the web project every commit to avoid misses
      run: bunx biome check --write .

    web-typecheck:
      root: "web/"
      glob: "**/*.{ts,tsx}"
      run: bunx tsc --noEmit

    web-knip:
      root: "web/"
      glob: "**/*.{ts,tsx,js,jsx,json}"
      run: bunx knip

    mock-oauth-test:
      glob: "mock-oauth/**/*.{ts,tsx}"
      run: task mock-oauth:test

    # Quality checks - zero tolerance
    code-duplication:
      glob: "**/*.{go,ts,tsx}"
      run: task duplication

    file-length:
      glob: "**/*"
      run: scripts/check_file_length.sh {staged_files}

    biome-ignores:
      root: "web/"
      glob: "**/*.{ts,tsx}"
      run: task check-ignores

    shellcheck:
      glob: "{*.sh,**/*.sh}"
      run: shellcheck {staged_files}

pre-push:
  parallel: false
  commands:
    # Run full CI suite
    ci:
      run: task ci

    # Scan for secrets before pushing
    secrets:
      run: task go:sec:secrets

    # Check for vulnerabilities
    vuln:
      run: task go:sec:vuln
