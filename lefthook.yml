pre-commit:
  parallel: true
  commands:
    go-fmt:
      glob: "*.go"
      run: gofmt -w {staged_files}
      stage_fixed: true

    go-vet:
      glob: "*.go"
      run: go vet ./...

    go-test:
      glob: "*.go"
      run: ./scripts/safe-test.sh -short ./...

    biome-format:
      root: "web/"
      glob: "src/**/*.{js,ts,jsx,tsx}"
      run: pnpm biome format --write {staged_files}
      stage_fixed: true

    biome-lint:
      root: "web/"
      glob: "src/**/*.{js,ts,jsx,tsx}"
      run: pnpm biome check --write {staged_files}
      stage_fixed: true

    web-typecheck:
      root: "web/"
      glob: "*.{ts,tsx}"
      run: pnpm tsc --noEmit
