version: "3"

env:
  WEB_PORT: "{{.WEB_PORT | default 5223}}"
  GATEWAY_PORT: "{{.GATEWAY_PORT | default 8447}}"
  MOCK_OAUTH_PORT: "{{.MOCK_OAUTH_PORT | default 3345}}"
  DOCKER_BUILDKIT: "{{.DOCKER_BUILDKIT | default 1}}"
  COMPOSE_DOCKER_CLI_BUILD: "{{.COMPOSE_DOCKER_CLI_BUILD | default 1}}"
  BUILDKIT_PROGRESS: "plain"

tasks:
  # ------------------------------
  # DEV stack (Vite + dev gateway)
  # ------------------------------
  up:dev:
    desc: Up full dev stack (infra + web + gateway)
    run: once
    aliases: [up]
    deps: ["stop:preview:gateway"]
    cmds:
      - docker compose up -d --pull never {{if not (eq .SKIP_BUILD "true")}}--build{{end}} postgres mock-oauth mock-convox web-dev gateway-api-dev

  up:dev:web:
    desc: Up dev web (Vite)
    run: once
    cmds:
      - docker compose up -d --pull never {{if not (eq .SKIP_BUILD "true")}}--build{{end}} web-dev

  up:dev:gateway:
    desc: Up dev gateway
    run: once
    deps: ["stop:preview:gateway"]
    cmds:
      - docker compose up -d --pull never {{if not (eq .SKIP_BUILD "true")}}--build{{end}} gateway-api-dev

  wait:dev:
    desc: Wait for dev stack readiness (Vite web under WEB_PORT)
    run: once
    aliases: [wait]
    cmds:
      - WEB_PORT={{.WEB_PORT}} GATEWAY_PORT={{.GATEWAY_PORT}} MOCK_OAUTH_PORT={{.MOCK_OAUTH_PORT}} CHECK_VITE_PROXY={{.CHECK_VITE_PROXY | default "true"}} bash scripts/wait-for-services.sh

  down:dev:
    desc: Down full dev stack (infra + web + gateway)
    run: once
    cmds:
      - docker compose down -v --remove-orphans postgres mock-oauth mock-convox web-dev gateway-api-dev

  down:dev:web:
    desc: Down dev web (Vite)
    run: once
    cmds:
      - docker compose down -v --remove-orphans web-dev

  down:dev:gateway:
    desc: Down dev gateway
    run: once
    cmds:
      - docker compose down -v --remove-orphans gateway-api-dev

  stop:dev:
    desc: Stop dev stack
    run: once
    deps: ["stop:dev:web", "stop:dev:gateway"]

  stop:dev:web:
    desc: Stop dev web (Vite)
    run: once
    cmds:
      - docker compose stop web-dev

  stop:dev:gateway:
    desc: Stop dev gateway
    run: once
    cmds:
      - docker compose stop gateway-api-dev

  # ----------------------------------------------
  # PREVIEW stack (compiled SPA + preview gateway)
  # ----------------------------------------------
  up:preview:
    desc: Up full preview stack (infra + web + gateway)
    run: once
    deps: ["stop:dev:web", "stop:dev:gateway"]
    cmds:
      - docker compose up -d --pull never {{if not (eq .SKIP_BUILD "true")}}--build{{end}} postgres mock-oauth mock-convox gateway-api-preview

  up:preview:gateway:
    desc: Up preview gateway (serves compiled SPA)
    run: once
    deps: ["stop:dev:gateway"]
    cmds:
      - docker compose up -d --pull never {{if not (eq .SKIP_BUILD "true")}}--build{{end}} gateway-api-preview

  wait:preview:
    desc: Wait for preview stack readiness (gateway serves SPA under GATEWAY_PORT)
    run: once
    cmds:
      - WEB_PORT={{.GATEWAY_PORT}} GATEWAY_PORT={{.GATEWAY_PORT}} MOCK_OAUTH_PORT={{.MOCK_OAUTH_PORT}} CHECK_VITE_PROXY=false bash scripts/wait-for-services.sh

  down:preview:
    desc: Down full preview stack
    run: once
    cmds:
      - docker compose down -v --remove-orphans postgres mock-oauth mock-convox gateway-api-preview

  down:preview:gateway:
    desc: Down preview gateway
    run: once
    cmds:
      - docker compose down -v --remove-orphans gateway-api-preview

  stop:preview:
    desc: Stop preview stack
    run: once
    deps: ["stop:preview:gateway"]

  stop:preview:gateway:
    desc: Stop preview gateway
    run: once
    cmds:
      - docker compose stop gateway-api-preview

  reset:dev:
    desc: Reset dev stack (down + up to recreate volumes and DB)
    run: once
    aliases: [reset]
    cmds:
      - task: down:dev
      - task: up:dev

  # ------------------------------
  # Database maintenance (dev)
  # ------------------------------
  db:migrate:
    desc: Apply database migrations inside the dev gateway container
    deps: [up:dev:gateway]
    cmds:
      - docker compose exec -T gateway-api-dev ./convox-gateway-api migrate

  db:reset:
    desc: Drop and recreate the dev database (DELETES ALL DATA)
    deps: [up:dev:gateway]
    vars:
      db_reset_env: >-
        RESET_CONVOX_GATEWAY_DATABASE=DELETE_ALL_DATA{{with .DISABLE_DATABASE_ENVIRONMENT_CHECK}} DISABLE_DATABASE_ENVIRONMENT_CHECK={{.}}{{end}}
    cmds:
      - docker compose exec -T gateway-api-dev env {{.db_reset_env}} ./convox-gateway-api reset-db

  # ------------------------------
  # Misc
  # ------------------------------
  logs:dev:
    aliases: [logs]
    deps: [wait:dev]
    desc: Tail logs for the dev stack
    cmds:
      - cmd: exec docker compose --profile dev logs -f $SRVS
        interactive: true
        tty: true
        ignore_error: true

  logs:preview:
    desc: Tail logs for the preview stack
    cmds:
      - cmd: exec docker compose --profile preview logs -f $SRVS
        interactive: true
        tty: true
        ignore_error: true

  down:
    desc: Tear down everything (all profiles) and remove volumes
    run: once
    cmds:
      - docker compose --profile dev --profile preview down -v --remove-orphans

  build:
    desc: Build Docker image for the gateway API
    run: once
    cmds:
      - docker build -t convox-gateway-api:latest .

  start:dev:
    aliases: [start]
    desc: Start dev stack and follow logs
    cmds:
      - task: up:dev
      - task: logs:dev

  start:preview:
    desc: Start preview stack and follow logs
    cmds:
      - task: up:preview
      - task: logs:preview
