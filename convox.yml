environment:
  - APP_JWT_KEY # required
  - GOOGLE_CLIENT_ID # required
  - GOOGLE_CLIENT_SECRET # required
  - GOOGLE_ALLOWED_DOMAIN # required, e.g. company.com
  - REDIRECT_URL # required, e.g. https://gateway.example.com/.gateway/web/callback
  - ADMIN_USERS # comma-separated bootstrap admins
  - RACK_HOST # required for gateway to proxy to target Convox API (host or full URL)
  - RACK_TOKEN # required API token for target rack
  - POSTMARK_API_TOKEN # optional email notifications
  - POSTMARK_FROM # optional sender address
  - CONVOX_SECRET_ENV_VARS=DATABASE_URL,REDIS_URL,SECRET_KEY_BASE
  # - GOOGLE_OAUTH_BASE_URL # optional; default Google; set to your OIDC issuer if needed
  # - POSTMARK_STREAM=outbound # optional stream
  # - GATEWAY_DB_PATH=/app/data/db.sqlite
  # - COOKIE_SECURE=true # in prod
  # - DEV_MODE=false
  # - RACK_USERNAME=convox # optional; defaults to convox

resources:
  data:
    type: storage
    size: 1g

services:
  gateway:
    build:
      path: .
      manifest: Dockerfile
    command: ./convox-gateway-api
    domain: ${GATEWAY_DOMAIN}
    environment:
      - PORT=8080
      - GATEWAY_DB_PATH=/app/data/db.sqlite
    health: /.gateway/api/health
    internal: false
    port: 8080
    resources:
      - data
    scale:
      count: 2
      cpu: 256
      memory: 256
    sticky: true

timers:
  audit-cleanup:
    schedule: "0 3 * * *"
    service: gateway
    command: "convox-gateway audit-cleanup --days 90"
