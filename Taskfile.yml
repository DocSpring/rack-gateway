version: "3"

vars:
  WEB_PORT: "{{.WEB_PORT | default 5173}}"
  GATEWAY_PORT: "{{.GATEWAY_PORT | default 8447}}"
  MOCK_OAUTH_PORT: "{{.MOCK_OAUTH_PORT | default 3345}}"

includes:
  docker: ./Taskfile.docker.yml
  go: ./Taskfile.go.yml
  web: ./Taskfile.web.yml

tasks:
  all:
    desc: Run linters, tests, and build
    deps: [lint, test, build]

  lint:
    desc: Run web + Go linters and typecheck
    deps: [web:lint, go:lint]

  test:
    desc: Run all tests
    cmds:
      - task: go:test
      - task: go:e2e:dev
      - task: web:test
      - task: web:e2e:dev

  build:
    desc: Build web + gateway + cli + mock binaries
    deps: [web:build, go:build]

  # Convenience alias for local dev stack (delegates to docker tasks)
  dev:
    desc: Start dev stack and follow logs
    deps: [docker:start:dev]
